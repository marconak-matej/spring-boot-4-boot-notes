spring:
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    schema:
      inspection:
        enabled: true
management:
  observations:
    annotations:
      enabled: true
    key-values:
      app: graphql-service
  metrics:
    tags:
      app: graphql-service
  server:
    port: 8888
  tracing:
    sampling:
      probability: 1.0
  info:
    git:
      mode: full
    build:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

logging:
  structured:
    format:
      console: logstash
    ecs:
      service:
        name: graphql-service
        version: 0.0.1
        environment: development
